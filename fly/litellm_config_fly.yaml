# LiteLLM config for the Fly deployment (sf-litellm). Forked from
# litellm_config_phoenix.yaml.
#
# Auth model: master_key + OAuth pass-through coexistence.
#   - Claude Code OAuth bearers (sk-ant-oat...) early-return proxy_admin in
#     the fork's user_api_key_auth before master_key check; forwarded to
#     api.anthropic.com as-is so per-user billing is preserved.
#   - Any other request must send `Authorization: Bearer <master_key>` or
#     get 401, blocking probes against the public hostname.
#   - Phoenix sees the span; we tag it with session_id for correlation.
#
# `forward_client_headers_to_llm_api: true` makes LiteLLM forward x-* and
# Authorization headers to the upstream LLM (needed for OAuth pass-through
# and for `x-litellm-metadata` session_id propagation per ENG2-1194 M3).
#
# Phoenix endpoints point at sf-phoenix.internal (set via env in
# litellm.fly.toml, so they don't appear here).

model_list:
  - model_name: "claude-opus-4-7"
    litellm_params:
      model: "claude-opus-4-7"
      api_key: os.environ/ANTHROPIC_API_KEY
      custom_llm_provider: "anthropic"

  - model_name: "claude-sonnet-4-6"
    litellm_params:
      model: "claude-sonnet-4-6"
      api_key: os.environ/ANTHROPIC_API_KEY
      custom_llm_provider: "anthropic"

  - model_name: "claude-haiku-4-5"
    litellm_params:
      model: "claude-haiku-4-5"
      api_key: os.environ/ANTHROPIC_API_KEY
      custom_llm_provider: "anthropic"

  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: "claude-opus-*"
    litellm_params:
      model: "claude-opus-*"
      api_key: os.environ/ANTHROPIC_API_KEY
      custom_llm_provider: "anthropic"

  - model_name: "claude-sonnet-*"
    litellm_params:
      model: "claude-sonnet-*"
      api_key: os.environ/ANTHROPIC_API_KEY
      custom_llm_provider: "anthropic"

  - model_name: "claude-haiku-*"
    litellm_params:
      model: "claude-haiku-*"
      api_key: os.environ/ANTHROPIC_API_KEY
      custom_llm_provider: "anthropic"

  - model_name: "claude-*"
    litellm_params:
      model: "claude-*"
      api_key: os.environ/ANTHROPIC_API_KEY
      custom_llm_provider: "anthropic"

litellm_settings:
  callbacks: ["arize_phoenix"]
  drop_params: false
  set_verbose: false
  pass_through_params: true

router_settings:
  routing_strategy: "simple-shuffle"
  enable_pre_call_checks: false
  disable_cooldowns: true
  allowed_fails: 1000

general_settings:
  # Forward Authorization + x-* headers to the upstream LLM. Required for
  # OAuth pass-through (sk-ant-oat... reaches api.anthropic.com) and for
  # x-litellm-metadata session_id propagation (ENG2-1194 M3 shim).
  forward_client_headers_to_llm_api: true
  # Probe gate. Fork's user_api_key_auth.py:382 early-returns proxy_admin
  # for sk-ant-oat... bearers BEFORE this check, so OAuth pass-through
  # continues to work; anything else must match this key or get 401.
  master_key: os.environ/LITELLM_MASTER_KEY
