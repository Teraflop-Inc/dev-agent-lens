# sf-litellm — patched LiteLLM proxy (aowen14/litellm-oauth-fix) on Fly,
# fronting Anthropic for Solutions-Fabric workspace runs (ENG2-1194).
#
# Inbound is **tailnet-only** (ENG2-1234). No `[http_service]` block, no
# allocated public IPs — the proxy is only reachable via:
#   - `sf-litellm.internal:4000` from another Fly app in the teraflop org
#   - `http://sf-tailscale-router:4000/` from a team member on the tailnet
# Outbound (to Anthropic etc.) is unaffected; that uses the egress NAT.
#
# Auth model retained as defense-in-depth even though network exposure
# is gated:
#   - Probe / non-OAuth requests must send `Authorization: Bearer <master_key>`
#     (LITELLM_MASTER_KEY in Fly secrets) or get 401.
#   - Claude Code OAuth requests send `Authorization: Bearer sk-ant-oat...`;
#     the fork's user_api_key_auth early-returns proxy_admin for OAuth bearers
#     before master_key check, so per-user Anthropic billing is preserved.
#   - SDK callers (non-OAuth) authenticate with the master key.
#
# Deploy:
#   cd dev-agent-lens
#   flyctl apps create sf-litellm --org teraflop
#   flyctl secrets set LITELLM_MASTER_KEY=$(openssl rand -hex 32) --app sf-litellm
#   flyctl deploy --app sf-litellm --config fly/litellm.fly.toml
#
# OTLP exports to sf-phoenix.internal:4317 over the Fly private mesh.

app = "sf-litellm"
primary_region = "iad"

[build]
  image = "aowen14/litellm-oauth-fix:latest"

[env]
  # Phoenix OTLP target — internal-only, no public listener on sf-phoenix:4317.
  OTEL_EXPORTER_OTLP_ENDPOINT = "http://sf-phoenix.internal:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL = "grpc"
  PHOENIX_COLLECTOR_ENDPOINT  = "http://sf-phoenix.internal:4317"

  # Project name in Phoenix UI — surface so spans from this proxy are filterable.
  OTEL_SERVICE_NAME = "sf-workspaces"
  OTEL_RESOURCE_ATTRIBUTES = "service.name=sf-workspaces,openinference.project.name=sf-workspaces"

  # Don't drop callback failures silently; LiteLLM's default-quiet on OTel
  # errors hid a misrouted endpoint for half a day in dev-agent-lens.
  LITELLM_LOG = "INFO"

# Ship the config into the image at deploy time. Fly's [[files]] copies the
# local file into the running container — no custom Dockerfile needed, no
# volume to keep in sync. The image's entrypoint reads /app/config.yaml
# (overridden via [processes.app] below if needed).
[[files]]
  guest_path = "/app/config.yaml"
  local_path = "fly/litellm_config_fly.yaml"

[processes]
  # Mirrors the docker-compose command for litellm-proxy-phoenix.
  # --host :: makes uvicorn bind dual-stack instead of IPv4-only; without
  # this, direct hits to sf-litellm.internal:4000 from another Fly app or
  # via the Tailscale subnet router (ENG2-1234) get ECONNREFUSED, because
  # Fly's private mesh is IPv6-only. Same fix as PHOENIX_HOST=:: in phoenix.fly.toml.
  app = "--config /app/config.yaml --host :: --port 4000 --num_workers 1"

# Internal-only service declaration. No `[[services.ports]]`, so the port
# only listens on the Fly 6PN mesh — public ingress is impossible without
# allocated IPs (which we explicitly released as part of ENG2-1234).
[[services]]
  internal_port = 4000
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
